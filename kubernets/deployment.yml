apiVersion: apps/v1
kind: Deployment

metadata:
  name: notes-app-deployment
  namespace: notes
  labels:
    app: django-notes-app

spec:
  replicas: 3

  selector:
    matchLabels:
      app: django-notes-app

  template:
    metadata:
      labels:
        app: django-notes-app

    spec:
      containers:
        - name: django-notes-app
          image: subhajit62/django-notes-app:latest
          ports:
            - containerPort: 8000